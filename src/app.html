<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />

		<style>
			:root {
				--base: clamp(1rem, 1vw + 0.5rem, 2rem);

				--gap-1: calc(var(--base) * 0.25);
				--gap-2: calc(var(--base) * 0.5);
				--gap-3: calc(var(--base) * 0.75);

				--family-1: 'Dosis', sans-serif;

				--shadow-1: rgba(0, 0, 0, 0.24) 0px 3px 8px;

				--radius-1: 0.25rem;
				--radius-2: 0.5rem;

				--fast: 0.25s ease-in-out;
				--normal: 0.5s ease-in-out;
				--slow: 1s ease-in-out;

				--white: rgb(255, 255, 255);
				--black: rgb(28, 28, 28);

				--success-color: rgba(63, 189, 63);
				--info-color: rgb(0, 143, 237);
				--warning-color: rgb(244, 172, 55);
				--error-color: rgb(252, 77, 100);
				--bg-color: rgb(28, 28, 28);
				--text-color: rgb(255, 255, 255);
				--border-color: rgb(51, 51, 51);
			}

			:root.light {
				--bg-color: rgb(255, 255, 255);
				--text-color: rgb(28, 28, 28);
				--border-color: rgb(200, 200, 200);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
			}
			html {
				scroll-behavior: smooth;
				text-rendering: optimizeLegibility;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}
			html > div {
				display: none;
			}
			body {
				position: relative;
				display: flex;
				flex-direction: column;
				gap: calc(var(--base) * 1);
				width: 100%;
				height: 100dvh;
				padding: calc(var(--base) * 1);
				color: var(--text-color);
				background-color: var(--bg-color);
				font-family: var(--family-1);
				transition:
					color var(--normal),
					background-color var(--normal);
			}
			svg {
				min-width: calc(var(--base) * 1.5);
				width: auto;
				height: 100%;
			}
			ul {
				list-style: none;
			}
			h2 {
				width: 100%;
				text-wrap: nowrap;
			}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<main style="display: contents">%sveltekit.body%</main>
	</body>
</html>
