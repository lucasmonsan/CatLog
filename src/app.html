<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />

		<style>
			:root {
				--slow: 0.5s ease-in-out;
				--fast: 0.25s ease-in-out;

				--shadow-1: rgba(46, 46, 51, 0.25) 0px 0.5rem 1.5rem 0px;
				--shadow-2: rgba(21, 21, 22, 0.25) 0px 0.5rem 1.5rem 0px;

				--radius-1: 1rem;
				--radius-2: 2rem;

				--primary: #eb5064;
				--secondary: #eb506540;
				--white: #fdfdfd;
				--black: #101010;

				--bg: #fdfdfd;
				--text: #101010;
				--subtext: rgba(0, 0, 0, 0.4);
				--border: rgba(0, 0, 0, 0.1);
			}
			:root.dark {
				--bg: #101010;
				--text: #fdfdfd;
				--subtext: rgba(255, 255, 255, 0.25);
				--border: rgba(255, 255, 255, 0.05);
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
			}
			html {
				scroll-behavior: smooth;
				font-size: clamp(0.95rem, 1vw + 0.5rem, 2rem);
				text-rendering: optimizeLegibility;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}
			html > div {
				display: none;
			}
			body {
				overflow: hidden;
				height: 100dvh;
				color: var(--text);
				background-color: var(--bg);
				transition:
					color var(--slow),
					background-color var(--slow);
			}
			h1,
			h2,
			h3,
			h4,
			h5,
			h6 {
				font-family: 'Rubik', serif;
			}
			p {
				font-family: 'Dosis', sans-serif;
			}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
